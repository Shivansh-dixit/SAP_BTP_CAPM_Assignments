# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: epmmodel1
type: application
builder:
  resources:
    excludes:
      - "/test-resources/**"
      - "/resources/**"
      - /test/**
      - /localService/**
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateVersionInfo
      configuration:
        archiveName: day14_epm_assignment.epmmodel1
        relativePaths: true
        additionalFiles:
          - xs-app.json
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: day14_epm_assignment.epmmodel1
        relativePaths: true
        additionalFiles:
          - xs-app.json
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
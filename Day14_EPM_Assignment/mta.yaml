_schema-version: 3.3.0
ID: day14_epm_assignment
description: A simple CAP project.
version: 1.0.0

modules:
- name: day14_epm_assignment-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: day14_epm_assignment-auth
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci

- name: day14_epm_assignment
  type: approuter.nodejs
  path: app/router
  requires:
  - name: day14_epm_assignment-html5-repo-rt
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  - name: day14_epm_assignment-auth
  - name: day14_epm_assignment-destination
    group: destinations
    properties:
      forwardAuthToken: false
      name: ui5
      url: https://ui5.sap.com
  provides:
  - name: app-api
    properties:
      app-protocol: ${protocol}
      app-uri: ${default-uri}
  parameters:
    disk-quota: 256M
    keep-existing-routes: true
    memory: 256M

- name: day14_epm_assignment-ui-deployer
  type: com.sap.application.content
  path: .
  requires:
  - name: day14_epm_assignment-auth
  - name: srv-api
  - name: day14_epm_assignment-html5-repo-host
    parameters:
      config:
        HTML5Runtime_enabled: true
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - day14_epm_assignment.epmmodel1.zip
      name: day14_epm_assignment-app
      target-path: resources/

- name: day14_epm_assignment-app
  type: html5
  path: app/epm_model_1
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []

resources:
- name: day14_epm_assignment-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
        redirect-uris:
        - https://*~{app-api/app-uri}/**
      tenant-mode: dedicated
      xsappname: day14_epm_assignment-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
  requires:
  - name: app-api

- name: day14_epm_assignment-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host

- name: day14_epm_assignment-html5-repo-rt
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-runtime

- name: day14_epm_assignment-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite
  requires:
  - name: srv-api

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
    - npx cds deploy --to sqlite:gen/srv/db.sqlite